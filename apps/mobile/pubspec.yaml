name: lumina
description: Proactive Engineering Sidekick — offline-first productivity agent for engineering students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Supabase (Auth + Realtime only — DB goes through backend/Prisma)
  supabase_flutter: ^2.5.0

  # Local storage
  hive_flutter: ^1.1.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Networking
  dio: ^5.4.3

  # OCR + ML
  google_mlkit_text_recognition: ^0.13.0
  tflite_flutter: ^0.12.1

  # PDF
  pdfx: ^2.7.0

  # Google Auth & APIs
  google_sign_in: ^6.2.1

  # Charts & Visualization
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2

  # Drawing / Whiteboard
  flutter_drawing_board: ^0.3.0

  # Camera / File Picker
  image_picker: ^1.1.2
  file_picker: ^8.0.3

  # System
  battery_plus: ^6.0.1
  flutter_local_notifications: ^17.2.2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.0
  crypto: ^3.0.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  flutter_inappwebview: ^6.0.0
  shared_preferences: ^2.5.3
  app_usage: ^4.1.0
  syncfusion_flutter_pdf: ^31.1.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
    - assets/animations/
